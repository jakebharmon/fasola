name: Monthly Database Update

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

jobs:
  update-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fasola repository
        uses: actions/checkout@v4

      - name: Download latest minutes.db
        run: |
          mkdir -p data
          curl -L "https://github.com/marktgodfrey/fasolaminutes_parsing/blob/master/minutes.db?raw=true" \
            -o data/database.sqlite

      - name: Commit and push updated database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/database.sqlite
          git commit -m "Auto-update database from monthly pipeline run" || echo "No changes to commit"
          git push
